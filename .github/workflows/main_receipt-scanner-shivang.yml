name: Build and deploy Node.js app

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
      - name: Install and Build
        run: |
          npm install
          npm run build --if-present
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .
          
  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write # Required for OIDC login
      contents: read
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_A956F25ABD0D4594A07CFF5C2927D090 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_7F77B88D327341F5A4C20143A2D43E57 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_EFD30BF4F91243B5817AE3D0D3C9B22B }}
      - name: Deploy to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'receipt-scanner-shivang'
          package: .
